<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <style>
        .error { color: red; font-size: 0.85em; }
        .mensaje-exito { color: green; }
    </style>
</head>
<body>
    <h1>Iniciar sesión</h1>

    {% if messages %}
        {% for message in messages %}
            <p class="mensaje-exito">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div>
            <label>{{ form.username.label }}</label>
            {{ form.username }}

        </div>

        <div>
            <label>{{ form.password.label }}</label>
            {{ form.password }}

        </div>

        <button type="submit">Iniciar sesión</button>
    </form>
    <p>¿No tienes cuenta? <a href="{% url 'registro' %}"> Regístrate</a></p>
    
<div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; align-items:center; justify-content:center;">
    <div style="background:white; color:black; padding:40px; border-radius:8px; text-align:center; max-width:380px; width:90%;">
        <h2>❌ Credenciales incorrectas</h2>
        <p>El correo o la contraseña son incorrectos.<br>Por favor verifica tus datos.</p>
        <br>
        <button onclick="cerrarModal()">Intentar de nuevo</button>
    </div>
</div>

<script>
    const loginFallido = {{ login_fallido|yesno:"true,false" }};
    const overlay = document.getElementById('modal-overlay');

    if (loginFallido) {
        overlay.style.display = 'flex';
    }

    function cerrarModal() {
        overlay.style.display = 'none';
    }
</script>

</body>
</html>
